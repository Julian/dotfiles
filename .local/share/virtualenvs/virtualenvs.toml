[bundle]
development = [
  "debugpy",
  "ptpython",
  "pudb",
  "pytest",
  "rich",
  "virtue",
]
perf = [
  "pyinstrument; platform_python_implementation != 'PyPy'",
  "pyperf",
  "python-papi; platform_system=='Linux' and platform_machine != 'aarch64'",
]
more = [
  "inflect",
  "pyyaml",

  "coverage",
  "hypothesis",
  "pytest-cov",
  "pytest-xdist",
]

# --- Development ---

[venv.dev]
python = "pypy3"
install-bundle = ["more", "development", "perf"]
link = [
  "coverage:coverage",
  "glom:glom",
  "ptpython:ptpypy",
  "pudb3:pudb",
  "py.test:py.test",
  "pyperf:pyperf",
  "testr:testr",
  "trial:trial",
  "twist:twist",
]
link-module = ["pydoc"]

[venv.dev-cpython]
install-bundle = ["more", "development", "perf"]
install = ["pyinstrument"]
link = [
  "coverage:coverage-cpython3",
  "glom:glom-cpython3",
  "ptpython:ptpython",
  "ptpython:ptpython3",
  "pyinstrument",
  "python:python3",
  "python:cpython3",
  "pudb3:pudb-cpython3",
  "py.test:py.test-cpython3",
  "pyperf:pyperf-cpython3",
  "testr:testr-cpython3",
  "trial:trial-cpython3",
  "twist:twist-cpython3",
]
link-module = ["venv"]

[venv.aubio]
install = ["aubio>=0.4.9"]
link = ["aubio", "aubiocut"]

[venv.beancount]
install = ["beancount", "beangulp", "beanprice", "fava"]
link = [
  "bean-check",
  "bean-doctor",
  "bean-example",
  "bean-format",
  "bean-price",
  "bean-query",
  "fava",
]

[venv.beets]
install = ["beets", "beautifulsoup4", "pyacoustid", "requests"]
link = ["beet"]

[tool]
bandit = {}
catt = {}
colortest = {}
detect-secrets = {}
doc8 = { install = ["pygments"] }
esbonio = {}
great = {}
httpie = {}
httpstat = {}
interrogate = {}
litecli = {}
maturin = {}
mypy = {}
ngxtop = {}
obsidiana = {}
pydocstyle = {}
pypinfo = {}
pyright = {}
termtosvg = {}
ty = {}

[venv.imaging]
install-bundle = ["development"]
install = [
  "libraw-cffi",
  "pillow",
  "rawkit",
]

[venv.jsonschema]
install-bundle = ["development"]
install = [
  "check-jsonschema",
  "hypothesis-jsonschema",
  "jsonschema[format]",
  "twisted",
]
link = ["check-jsonschema", "jsonschema"]

[venv.math]
install-bundle = ["development"]
install = ["sympy"]
link = ["ptpython:math"]

