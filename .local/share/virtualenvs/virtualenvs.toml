[venv.nbdiff]
install = ["nbdime"]
link = [
  "git-nbdiffdriver",
  "git-nbdifftool",
  "git-nbmergedriver",
  "git-nbmergetool",
  "hg-nbdiff",
  "hg-nbdiffweb",
  "hg-nbmerge",
  "hg-nbmergeweb",
  "nbdiff",
  "nbdiff-web",
  "nbdime",
  "nbmerge",
  "nbmerge-web",
  "nbshow",
]

[venv.neovim]
python = "python3.13"
install = ["jedi", "pynvim", "sphinx"]
post-commands = [["nvim", "+UpdateRemotePlugins", "+quit"]]

[venv.remarshal]
install = ["remarshal"]
link = [
  "json2json",
  "toml2json",
  "yaml2json",
  "json2toml",
  "toml2toml",
  "yaml2toml",
  "json2yaml",
  "toml2yaml",
  "yaml2yaml",
]

[venv.scrapy]
install = ["scrapy"]
link = ["scrapy"]

[venv.ssh-audit]
install = ["ssh-audit"]
link = ["ssh-audit"]

[venv.sphinx]
install-bundle = ["development"]
install = ["recommonmark", "sphinx", "sphinxcontrib.spelling"]
link = [
  "cm2html",
  "cm2latex",
  "cm2man",
  "cm2pseudoxml",
  "cm2xetex",
  "cm2xml",
  "rst2html",
  "rst2html5",
  "sphinx-apidoc",
  "sphinx-autogen",
  "sphinx-build",
  "sphinx-quickstart",
]
link-module = ["sphinx.ext.intersphinx:intersphinx"]

[venv.steck]
install = ["steck"]
link = ["steck:bpaste", "steck"]

[venv.subunit]
install = ["python-subunit"]
