  "subunit-filter",
  "subunit-ls",
  "subunit-notify",
  "subunit-output",
  "subunit-stats",
  "subunit-tags",
  "subunit2csv",
  "subunit2disk",
  "subunit2gtk",
  "subunit2junitxml",
  "subunit2pyunit",
  "tap2subunit",
]

[venv.watchdog]
install = ["watchdog[watchmedo]"]
link = ["watchmedo"]

[venv.wormhole]
install = ["magic-wormhole"]
link = ["wormhole"]

# --- Packaging ---

[venv.build]
install = ["build"]
link = ["pyproject-build"]

[venv.check-manifest]
install = ["check-manifest"]
link = ["check-manifest"]

[venv.mkpkg]
install = ["mkpkg"]
link = ["mkpkg"]

[venv.nox]
install = ["nox"]
link = ["nox"]

[venv.ruff]
install = ["ruff", "ruff-lsp"]
link = ["ruff", "ruff-lsp"]

[venv.shrinkray]
install = ["shrinkray"]
link = ["shrinkray"]

# --- Developing ---

[dev.blog]
project = "${DEVELOPMENT}/blog"
link = ["pelican", "pelican-quickstart", "pelican-themes"]

[dev.bowtie]
project = "${DEVELOPMENT}/bowtie"
link = ["bowtie"]

[dev.obsidiana]
project = "${DEVELOPMENT}/obsidiana"

[dev.photography]
project = "${DEVELOPMENT}/photography-cli"
link = ["photography"]
